// ── STORAGE LAYER ──
const DB_PREFIX = "bakara_";

class Storage {
  constructor() {
    this.supabase = supabase;
    this.online = !!supabase;
  }

  async get(key) {
    if (this.online) {
      try {
        const { data, error } = await this.supabase.from('bakara_data').select('data').eq('id', key).single();
        if (!error && data) return data.data;
      } catch(e) { console.warn("Supabase read failed, using local:", e); }
    }
    const v = localStorage.getItem(DB_PREFIX + key);
    return v ? JSON.parse(v) : null;
  }

  async set(key, value) {
    localStorage.setItem(DB_PREFIX + key, JSON.stringify(value));
    if (this.online) {
      try {
        await this.supabase.from('bakara_data').upsert({ id: key, data: value, updated_at: new Date().toISOString() });
      } catch(e) { console.warn("Supabase write failed:", e); }
    }
  }

  isOnline() { return this.online; }
}

const storage = new Storage();

async function loadData(key, fallback) {
  const d = await storage.get(key);
  return d || fallback;
}
async function saveData(key, data) { await storage.set(key, data); }

function LoginScreen({onLogin}){
  const [email,setEmail]=useState("");
  const [pwd,setPwd]=useState("");
  const [err,setErr]=useState("");
  const [busy,setBusy]=useState(false);

  const doLogin=async()=>{
    if(!email||!pwd){setErr("Email et mot de passe requis");return}
    setBusy(true);setErr("");
    try {
      const {data,error}=await supabase.auth.signInWithPassword({email:email.trim(),password:pwd});
      if(error){setErr(error.message==="Invalid login credentials"?"Email ou mot de passe incorrect":error.message);setBusy(false);return}
      onLogin(data.session);
    } catch(e){setErr("Erreur de connexion: "+e.message);setBusy(false)}
  };

  const onKey=e=>{if(e.key==="Enter")doLogin()};

  return(<div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a,#1e293b)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>

  const fmtD=d=>{if(!d)return"--";const[y,m,day]=d.split("-");return`${day}/${m}/${y}`};
  // Filter + sort by date desc (newest first), legacy entries fallback to id desc
  const filtered=data.filter(x=>(!fil||x.c===fil)&&(!q||x.d.toLowerCase().includes(q.toLowerCase())));
  const list=[...filtered].sort((a,b)=>{
    if(a.date&&b.date)return b.date.localeCompare(a.date);
    if(a.date)return -1;
    if(b.date)return 1;
    return b.id-a.id;
  });
  const tot=list.reduce((s,x)=>s+x.m,0);

  const doSave=()=>{if(!form.d||!form.m)return;const u=eid?data.map(x=>x.id===eid?{...x,...form}:x):[...data,{...form,id:Date.now()}];setData(u);save(u);setF({d:"",c:"",date:"",m:0,n:""});setEid(null);setShow(false)};
  const doEdit=x=>{setF({d:x.d,c:x.c,date:x.date||"",m:x.m,n:x.n||""});setEid(x.id);setShow(true)};
  const doDel=id=>{if(!confirm("Supprimer cette charge ?"))return;const u=data.filter(x=>x.id!==id);setData(u);save(u)};
  const doAdd=()=>{setEid(null);setF({d:"",c:"",date:today(),m:0,n:""});setShow(true)};

  return(<div>
    <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
      {!ro&&<Btn onClick={doAdd} c="#16a34a">+ Charge</Btn>}
      <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Rechercher..." style={{padding:"8px 12px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:12,flex:1,minWidth:120,outline:"none"}}/>
      <select value={fil} onChange={e=>setFil(e.target.value)} style={{padding:"8px 10px",border:"1.5px solid #e2e8f0",borderRadius:8,fontSize:11,background:"#fff"}}>
        <option value="">Toutes</option>{CATS.map(c=><option key={c} value={c}>{c}</option>)}
      </select>
    </div>
    <div style={{background:"#fff",borderRadius:12,border:"1px solid #e2e8f0",overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
          <thead><tr style={{background:"#1e293b"}}>{["#","Date","Designation","Categorie","Montant",...(ro?[]:[""])].map(h=><th key={h} style={{padding:"10px 12px",color:"#fff",fontWeight:600,textAlign:h==="Montant"?"right":"left",fontSize:10,textTransform:"uppercase",letterSpacing:.5}}>{h}</th>)}</tr></thead>
          <tbody>{list.map((x,i)=><tr key={x.id} style={{background:i%2?"#f8fafc":"#fff",borderBottom:"1px solid #f1f5f9"}}>
            <td style={{padding:"8px 12px",color:"#94a3b8"}}>{i+1}</td>
            <td className="mono" style={{padding:"8px 12px",color:"#64748b",whiteSpace:"nowrap"}}>{x.date?fmtD(x.date):(x.p||"--")}</td>
            <td style={{padding:"8px 12px",fontWeight:500,maxWidth:240}}>{x.d}{x.n?<span style={{color:"#94a3b8",fontSize:9,marginLeft:4}}>({x.n})</span>:null}</td>
            <td style={{padding:"8px 12px"}}><Badge t={x.c} c={CAT_C[x.c]||"#64748b"}/></td>
            <td className="mono" style={{padding:"8px 12px",textAlign:"right",fontWeight:600}}>{fmt(x.m)}</td>
            {!ro&&<td style={{padding:"8px 6px",textAlign:"right",whiteSpace:"nowrap"}}>
              <button onClick={()=>doEdit(x)} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:"#3b82f6",padding:3}}>&#9998;</button>
              <button onClick={()=>doDel(x.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:"#ef4444",padding:3,marginLeft:2}}>&#10005;</button>
            </td>}
          </tr>)}</tbody>
          <tfoot><tr style={{background:"#1e293b"}}><td colSpan={4} style={{padding:"10px 12px",color:"#fff",fontWeight:700,fontSize:11}}>TOTAL ({list.length})</td><td className="mono" style={{padding:"10px 12px",textAlign:"right",color:"#fff",fontWeight:700,fontSize:13}}>{fmt(tot)}</td>{!ro&&<td/>}</tr></tfoot>
        </table>
      </div>
    </div>
    <Modal show={show} onClose={()=>setShow(false)} title={eid?"Modifier la charge":"Nouvelle charge"}>
      <Inp l="Designation" v={form.d} onChange={v=>setF({...form,d:v})} ph="Ex: Frais avocat..."/>
      <Inp l="Categorie" v={form.c} onChange={v=>setF({...form,c:v})} opts={CATS}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Inp l="Montant (MAD)" v={form.m} onChange={v=>setF({...form,m:v})} type="number"/>
        <Inp l="Date" v={form.date} onChange={v=>setF({...form,date:v})} type="date"/>
      </div>
      <Inp l="Notes" v={form.n} onChange={v=>setF({...form,n:v})} ph="Optionnel"/>
      <div style={{display:"flex",gap:6,justifyContent:"flex-end",marginTop:6}}>
        <Btn onClick={()=>setShow(false)} outline c="#64748b">Annuler</Btn>
        <Btn onClick={doSave} disabled={!form.d||!form.m}>{eid?"Modifier":"Ajouter"}</Btn>
      </div>
    </Modal>
  </div>);
}

// ── ALIMENTATION ──
function Alim({data,setData,save,ro}){
  const [show,setShow]=useState(false),[form,setF]=useState({s:"",m:0,t:"",p:""}),[eid,setEid]=useState(null);
  const tot=data.reduce((s,x)=>s+x.m,0);
  const doSave=()=>{if(!form.s||!form.m)return;const u=eid?data.map(x=>x.id===eid?{...x,...form}:x):[...data,{...form,id:Date.now()}];setData(u);save(u);setF({s:"",m:0,t:"",p:""});setEid(null);setShow(false)};

  return(<div>
    {!ro&&<Btn onClick={()=>{setEid(null);setF({s:"",m:0,t:"",p:""});setShow(true)}} c="#16a34a">+ Alimentation</Btn>}
    <div style={{background:"#fff",borderRadius:12,border:"1px solid #e2e8f0",overflow:"hidden",marginTop:12}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
        <thead><tr style={{background:"#1e293b"}}>{["#","Source","Type","Periode","Montant",...(ro?[]:[""])].map(h=><th key={h} style={{padding:"9px 10px",color:"#fff",fontWeight:600,textAlign:h==="Montant"?"right":"left",fontSize:10,textTransform:"uppercase"}}>{h}</th>)}</tr></thead>
        <tbody>{data.map((x,i)=><tr key={x.id} style={{background:i%2?"#f8fafc":"#fff",borderBottom:"1px solid #f1f5f9"}}>
          <td style={{padding:"7px 10px",color:"#94a3b8"}}>{i+1}</td>
          <td style={{padding:"7px 10px",fontWeight:500}}>{x.s}</td>
          <td style={{padding:"7px 10px"}}><Badge t={x.t||"--"} c="#2563eb"/></td>
          <td style={{padding:"7px 10px",color:"#64748b"}}>{x.p}</td>
          <td className="mono" style={{padding:"7px 10px",textAlign:"right",fontWeight:600,color:"#16a34a"}}>{fmt(x.m)}</td>
          {!ro&&<td style={{padding:"7px 6px",textAlign:"right",whiteSpace:"nowrap"}}>
            <button onClick={()=>{setF({s:x.s,m:x.m,t:x.t||"",p:x.p});setEid(x.id);setShow(true)}} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"#3b82f6",padding:2}}>&#9998;</button>
            <button onClick={()=>{if(!confirm("Supprimer cette alimentation ?"))return;const u=data.filter(y=>y.id!==x.id);setData(u);save(u)}} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"#ef4444",padding:2,marginLeft:2}}>&#10005;</button>
          </td>}
        </tr>)}</tbody>
        <tfoot><tr style={{background:"#16a34a"}}><td colSpan={4} style={{padding:"9px 10px",color:"#fff",fontWeight:700}}>TOTAL</td><td className="mono" style={{padding:"9px 10px",textAlign:"right",color:"#fff",fontWeight:700,fontSize:13}}>{fmt(tot)}</td>{!ro&&<td/>}</tr></tfoot>
      </table>
    </div>
    <Modal show={show} onClose={()=>setShow(false)} title={eid?"Modifier":"Nouvelle alimentation"}>
      <Inp l="Source" v={form.s} onChange={v=>setF({...form,s:v})} ph="Ex: Cheque HOUMAN"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Inp l="Montant (MAD)" v={form.m} onChange={v=>setF({...form,m:v})} type="number"/>
        <Inp l="Type" v={form.t} onChange={v=>setF({...form,t:v})} opts={["Echeance","Cheque","Virement","Espece","Autre"]}/>
      </div>
      <Inp l="Periode" v={form.p} onChange={v=>setF({...form,p:v})} ph="2025"/>
      <div style={{display:"flex",gap:6,justifyContent:"flex-end",marginTop:6}}>
        <Btn onClick={()=>setShow(false)} outline c="#64748b">Annuler</Btn>
        <Btn onClick={doSave} disabled={!form.s||!form.m}>{eid?"Modifier":"Ajouter"}</Btn>
      </div>
    </Modal>
  </div>);
}


// ── MAIN APP ──
const TABS=[{k:"dash",l:"Dashboard",i:"◼"},{k:"ch",l:"Charges",i:"▼"},{k:"al",l:"Alimentation",i:"▲"}];

function App(){
  const [tab,setTab]=useState("dash"),[loading,setLoading]=useState(true),[saved,setSaved]=useState(false);
  const [ch,setCh]=useState([]),[al,setAl]=useState([]);
  const [session,setSession]=useState(null),[profile,setProfile]=useState(null),[authReady,setAuthReady]=useState(false);

  // 1) Auth bootstrap: check existing session + subscribe to changes
  useEffect(()=>{
    if(!supabase){setAuthReady(true);return}
    supabase.auth.getSession().then(({data})=>{setSession(data.session);setAuthReady(true)});
    const {data:{subscription}}=supabase.auth.onAuthStateChange((_e,s)=>{
      setSession(s);
      if(!s){setProfile(null);setCh([]);setAl([])}
    });
    return ()=>subscription.unsubscribe();
  },[]);

  // 2) Load profile (role) when session changes
  useEffect(()=>{
    if(!session||!supabase){setProfile(null);return}
    supabase.from('profiles').select('*').eq('id',session.user.id).single().then(({data,error})=>{
      if(error)console.warn("Profile fetch error:",error.message);
      setProfile(data||{role:'guest',email:session.user.email,id:session.user.id});
    });
  },[session]);

  // 3) Load data: when authenticated (or when Supabase is not configured)
  useEffect(()=>{
    if(supabase&&!session){setLoading(false);return}
    (async()=>{
      setLoading(true);
      const [c,a]=await Promise.all([loadData("charges",INIT_CHARGES),loadData("alim",INIT_ALIM)]);
      setCh(c);setAl(a);setLoading(false);
    })();
  },[session]);

  const flash=useCallback(()=>{setSaved(true);setTimeout(()=>setSaved(false),1500)},[]);
  const sC=d=>{saveData("charges",d);flash()};
  const sA=d=>{saveData("alim",d);flash()};

  const logout=async()=>{if(confirm("Se deconnecter ?"))await supabase.auth.signOut()};

  const tc=ch.reduce((s,x)=>s+x.m,0),ta=al.reduce((s,x)=>s+x.m,0);
  const ro=profile?profile.role==='guest':false;
  const roleBadge=profile?{admin:{c:"#16a34a",l:"Admin"},family:{c:"#3b82f6",l:"Famille"},guest:{c:"#64748b",l:"Invite"}}[profile.role]||{c:"#64748b",l:profile.role}:null;

  // Render gates
  if(!authReady)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:"#64748b"}}>Initialisation...</div>;
  if(supabase&&!session)return<LoginScreen onLogin={setSession}/>;
  if(loading)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:"#64748b"}}>Chargement des donnees...</div>;

  return(<div style={{background:"var(--bg)",minHeight:"100vh"}}>
    <div style={{background:"linear-gradient(135deg,#0f172a,#1e293b)",padding:"14px 16px",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 12px rgba(0,0,0,0.15)"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,gap:8,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:34,height:34,borderRadius:9,background:"linear-gradient(135deg,#3b82f6,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:15,boxShadow:"0 2px 8px rgba(59,130,246,0.4)"}}>B</div>
          <div><div style={{color:"#fff",fontSize:16,fontWeight:700,letterSpacing:.3}}>BAKARA</div><div style={{color:"#64748b",fontSize:9}}>Gestion financiere {storage.isOnline()?"● En ligne":"○ Local"}</div></div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
          {saved&&<span style={{color:"#22c55e",fontSize:10,fontWeight:600,animation:"fadeIn .3s"}}>✓ Sauvegarde</span>}
          {roleBadge&&<span title={profile.email} style={{background:roleBadge.c,color:"#fff",padding:"4px 10px",borderRadius:6,fontSize:9,fontWeight:700,letterSpacing:.5,textTransform:"uppercase"}}>{roleBadge.l}</span>}
          {session&&<button onClick={logout} title={"Se deconnecter ("+(profile?.email||"")+")"} style={{background:"#334155",color:"#fff",border:"none",borderRadius:6,padding:"5px 11px",fontSize:10,cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>⏏ Logout</button>}
        </div>
      </div>
      <div style={{display:"flex",gap:4,overflowX:"auto"}}>
        {TABS.map(t=><button key={t.k} onClick={()=>setTab(t.k)} style={{padding:"7px 16px",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,whiteSpace:"nowrap",fontFamily:"inherit",background:tab===t.k?"#3b82f6":"transparent",color:tab===t.k?"#fff":"#94a3b8",transition:"all .2s"}}>{t.i} {t.l}</button>)}
      </div>
    </div>
    <div style={{padding:"16px",maxWidth:1000,margin:"0 auto"}}>
      {tab==="dash"&&<Dash ch={ch} al={al}/>}
      {tab==="ch"&&<Charges data={ch} setData={setCh} save={sC} ro={ro}/>}
      {tab==="al"&&<Alim data={al} setData={setAl} save={sA} ro={ro}/>}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
