const _cfg = window.BAKARA_CONFIG || {};
const supabase = (_cfg.SUPABASE_URL && _cfg.SUPABASE_KEY)
  ? (() => { try { return window.supabase.createClient(_cfg.SUPABASE_URL, _cfg.SUPABASE_KEY); } catch(e){ console.warn("Supabase init failed:",e); return null; } })()
  : null;

// ── STORAGE LAYER ──
const DB_PREFIX = "bakara_";

class Storage {
  constructor() {
    this.supabase = supabase;
    this.online = !!supabase;
  }

  async get(key) {
    if (this.online) {
      try {
        const { data, error } = await this.supabase.from('bakara_data').select('data').eq('id', key).single();
        if (!error && data) return data.data;
      } catch(e) { console.warn("Supabase read failed, using local:", e); }
    }
    const v = localStorage.getItem(DB_PREFIX + key);
    return v ? JSON.parse(v) : null;
  }

  async set(key, value) {
    localStorage.setItem(DB_PREFIX + key, JSON.stringify(value));
    if (this.online) {
      try {
        await this.supabase.from('bakara_data').upsert({ id: key, data: value, updated_at: new Date().toISOString() });
      } catch(e) { console.warn("Supabase write failed:", e); }
    }
  }

  isOnline() { return this.online; }
}

const storage = new Storage();

async function loadData(key, fallback) {
  const d = await storage.get(key);
  return d || fallback;
}
async function saveData(key, data) { await storage.set(key, data); }

// ── LOGIN SCREEN ──
function LoginScreen({onLogin}){
  const [email,setEmail]=useState("");
  const [pwd,setPwd]=useState("");
  const [err,setErr]=useState("");
  const [busy,setBusy]=useState(false);

  const doLogin=async()=>{
    if(!email||!pwd){setErr("Email et mot de passe requis");return}
    setBusy(true);setErr("");
    try {
      const {data,error}=await supabase.auth.signInWithPassword({email:email.trim(),password:pwd});
      if(error){setErr(error.message==="Invalid login credentials"?"Email ou mot de passe incorrect":error.message);setBusy(false);return}
      onLogin(data.session);
    } catch(e){setErr("Erreur de connexion: "+e.message);setBusy(false)}
  };

  const onKey=e=>{if(e.key==="Enter")doLogin()};

  return(<div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a,#1e293b)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div style={{background:"#fff",borderRadius:16,padding:"32px 28px",width:"100%",maxWidth:380,boxShadow:"0 20px 60px rgba(0,0,0,0.4)"}}>
      <div style={{textAlign:"center",marginBottom:22}}>

        <h1 style={{fontSize:18,fontWeight:700,color:"#1e293b",margin:0}}>BAKARA</h1>
        <p style={{fontSize:11,color:"#94a3b8",marginTop:4}}>Gestion financiere - Connexion</p>
      </div>
      <div onKeyDown={onKey}>
        <Inp l="Email" v={email} onChange={setEmail} type="email" ph="email@exemple.com"/>
        <Inp l="Mot de passe" v={pwd} onChange={setPwd} type="password" ph="********"/>
      </div>
      {err&&<div style={{background:"#fee2e2",color:"#dc2626",padding:"9px 12px",borderRadius:8,fontSize:11,marginBottom:12,border:"1px solid #fecaca"}}>{err}</div>}

    </div>
  </div>);
}

// ── DASHBOARD ──
function Dash({ch,al,la,ti,lo}){
  const tc=ch.reduce((s,x)=>s+x.m,0), ta=al.reduce((s,x)=>s+x.m,0), caisse=ta-tc;
  const lp=la.reduce((s,x)=>s+x.p,0), tp=ti.reduce((s,x)=>s+x.p,0);
  const lr=la.reduce((s,x)=>s+x.v,0)-lp, tr=ti.reduce((s,x)=>s+x.v,0)-tp;
  const byCat=CATS.map(cat=>({cat,t:ch.filter(x=>x.c===cat).reduce((s,x)=>s+x.m,0)})).filter(x=>x.t>0).sort((a,b)=>b.t-a.t);
  const mx=Math.max(...byCat.map(x=>x.t),1);
  const loyP=lo.reduce((s,l)=>s+l.paiements.filter(p=>p.paye).reduce((ss,p)=>ss+p.montant,0),0);
  const loyD=lo.reduce((s,l)=>s+l.paiements.filter(p=>!p.paye).length*l.loyer,0);

  return(<div>
    <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
      <KPI l="Alimentation" v={`${fmtK(ta)} MAD`} c="#16a34a" s="Total fonds"/>
      <KPI l="Depenses" v={`${fmtK(tc)} MAD`} c="#dc2626" s={`${ch.length} lignes`}/>
      <KPI l="Caisse" v={`${fmtK(caisse)} MAD`} c={caisse>=0?"#2563eb":"#991b1b"} s={caisse>=0?"Positif":"Deficit"}/>
      <KPI l="Recouvrement" v={`${fmtK(lp+tp)} MAD`} c="#7c3aed" s={`Reste ${fmtK(lr+tr)}`}/>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:12}}>
      <div style={{background:"#fff",borderRadius:12,padding:14,border:"1px solid #e2e8f0"}}>
        <h4 style={{fontSize:12,fontWeight:700,color:"#475569",textTransform:"uppercase",marginBottom:10,letterSpacing:.5}}>Depenses par categorie</h4>
        {byCat.map(({cat,t})=>(<div key={cat} style={{marginBottom:6}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:2}}>
            <span style={{fontWeight:500}}>{cat}</span>
            <span className="mono" style={{fontWeight:700}}>{fmt(t)}</span>
          </div>
          <div style={{background:"#e2e8f0",borderRadius:4,height:6,overflow:"hidden"}}>
            <div style={{width:`${(t/mx)*100}%`,height:"100%",background:CAT_C[cat],borderRadius:4,transition:"width .5s"}}/>
          </div>
        </div>))}
      </div>
      <div style={{background:"#fff",borderRadius:12,padding:14,border:"1px solid #e2e8f0"}}>
        <h4 style={{fontSize:12,fontWeight:700,color:"#475569",textTransform:"uppercase",marginBottom:10,letterSpacing:.5}}>Recouvrement</h4>
        {[{n:"Rachid Laamiri",p:lp,v:la.reduce((s,x)=>s+x.v,0)},{n:"Abderazzak Tirmidi",p:tp,v:ti.reduce((s,x)=>s+x.v,0)}].map(r=>(
          <div key={r.n} style={{marginBottom:10,padding:10,background:"#f8fafc",borderRadius:8}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontSize:12,fontWeight:600}}>{r.n}</span>
              <span style={{fontSize:12,fontWeight:700,color:r.p>=r.v?"#16a34a":"#f59e0b"}}>{r.v>0?Math.round(r.p/r.v*100):0}%</span>
            </div>
            <div style={{background:"#e2e8f0",borderRadius:4,height:6}}>
              <div style={{width:`${r.v>0?(r.p/r.v)*100:0}%`,height:"100%",background:r.p>=r.v?"#22c55e":"#f59e0b",borderRadius:4}}/>
            </div>
          </div>
        ))}
        {lo.filter(l=>l.locataire).length>0&&<div style={{marginTop:10,padding:10,background:"#f8fafc",borderRadius:8}}>
          <div style={{fontSize:12,fontWeight:700,marginBottom:4}}>Loyers</div>
          <div style={{display:"flex",gap:12,fontSize:11}}>
            <span style={{color:"#16a34a",fontWeight:600}}>Percus: {fmt(loyP)}</span>
            <span style={{color:"#ef4444",fontWeight:600}}>Dus: {fmt(loyD)}</span>
          </div>
        </div>}
      </div>
    </div>
  </div>);

// ── MAIN APP ──
const TABS=[{k:"dash",l:"Dashboard",i:"◼"},{k:"ch",l:"Charges",i:"▼"},{k:"al",l:"Alimentation",i:"▲"},{k:"lo",l:"Loyers",i:"⌂"},{k:"la",l:"Laamiri",i:"●"},{k:"ti",l:"Tirmidi",i:"●"}];

function App(){
  const [tab,setTab]=useState("dash"),[loading,setLoading]=useState(true),[saved,setSaved]=useState(false);
  const [ch,setCh]=useState([]),[al,setAl]=useState([]),[la,setLa]=useState([]),[ti,setTi]=useState([]),[lo,setLo]=useState([]);
  const [session,setSession]=useState(null),[profile,setProfile]=useState(null),[authReady,setAuthReady]=useState(false);

  // 1) Auth bootstrap: check existing session + subscribe to changes
  useEffect(()=>{
    if(!supabase){setAuthReady(true);return}
    supabase.auth.getSession().then(({data})=>{setSession(data.session);setAuthReady(true)});
    const {data:{subscription}}=supabase.auth.onAuthStateChange((_e,s)=>{
      setSession(s);
      if(!s){setProfile(null);setCh([]);setAl([]);setLa([]);setTi([]);setLo([])}
    });
    return ()=>subscription.unsubscribe();
  },[]);

  // 2) Load profile (role) when session changes
  useEffect(()=>{
    if(!session||!supabase){setProfile(null);return}
    supabase.from('profiles').select('*').eq('id',session.user.id).single().then(({data,error})=>{
      if(error)console.warn("Profile fetch error:",error.message);
      setProfile(data||{role:'guest',email:session.user.email,id:session.user.id});
    });
  },[session]);

  // 3) Load data: when authenticated (or when Supabase is not configured)
  useEffect(()=>{
    if(supabase&&!session){setLoading(false);return}
    (async()=>{
      setLoading(true);
      const [c,a,l,t,o]=await Promise.all([loadData("charges",INIT_CHARGES),loadData("alim",INIT_ALIM),loadData("laamiri",mkLaam()),loadData("tirmidi",mkTirm()),loadData("loyers",[])]);
      setCh(c);setAl(a);setLa(l);setTi(t);setLo(o);setLoading(false);
    })();
  },[session]);

  const flash=useCallback(()=>{setSaved(true);setTimeout(()=>setSaved(false),1500)},[]);
  const sC=d=>{saveData("charges",d);flash()};
  const sA=d=>{saveData("alim",d);flash()};
  const sL=d=>{saveData("laamiri",d);flash()};
  const sT=d=>{saveData("tirmidi",d);flash()};
  const sO=d=>{saveData("loyers",d);flash()};

  const logout=async()=>{if(confirm("Se deconnecter ?"))await supabase.auth.signOut()};

  const tc=ch.reduce((s,x)=>s+x.m,0),ta=al.reduce((s,x)=>s+x.m,0);
  const ro=profile?profile.role==='guest':false;
  const roleBadge=profile?{admin:{c:"#16a34a",l:"Admin"},family:{c:"#3b82f6",l:"Famille"},guest:{c:"#64748b",l:"Invite"}}[profile.role]||{c:"#64748b",l:profile.role}:null;

  // Render gates
  if(!authReady)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:"#64748b"}}>Initialisation...</div>;
  if(supabase&&!session)return<LoginScreen onLogin={setSession}/>;
  if(loading)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:"#64748b"}}>Chargement des donnees...</div>;

  return(<div style={{background:"#f1f5f9",minHeight:"100vh"}}>
    <div style={{background:"linear-gradient(135deg,#0f172a,#1e293b)",padding:"14px 16px",position:"sticky",top:0,zIndex:100}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8,gap:8,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:30,height:30,borderRadius:8,background:"linear-gradient(135deg,#3b82f6,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:13}}>B</div>
          <div><div style={{color:"#fff",fontSize:15,fontWeight:700}}>BAKARA</div><div style={{color:"#64748b",fontSize:9}}>Gestion financiere {storage.isOnline()?"● En ligne":"○ Local"}</div></div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
          {saved&&<span style={{color:"#22c55e",fontSize:10,fontWeight:600,animation:"fadeIn .3s"}}>Sauvegarde !</span>}
          <div style={{background:"#334155",borderRadius:8,padding:"5px 10px",fontSize:10,color:"#94a3b8"}}>
            Caisse: <span className="mono" style={{color:ta-tc>=0?"#22c55e":"#ef4444",fontWeight:700}}>{fmtK(ta-tc)} MAD</span>
          </div>
          {roleBadge&&<span title={profile.email} style={{background:roleBadge.c,color:"#fff",padding:"4px 9px",borderRadius:6,fontSize:9,fontWeight:700,letterSpacing:.5,textTransform:"uppercase"}}>{roleBadge.l}</span>}
          {session&&<button onClick={logout} title={"Se deconnecter ("+profile?.email+")"} style={{background:"#334155",color:"#fff",border:"none",borderRadius:6,padding:"5px 10px",fontSize:10,cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>⏏ Logout</button>}
        </div>
      </div>
      <div style={{display:"flex",gap:3,overflowX:"auto"}}>
        {TABS.map(t=><button key={t.k} onClick={()=>setTab(t.k)} style={{padding:"6px 12px",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,whiteSpace:"nowrap",fontFamily:"inherit",background:tab===t.k?"#3b82f6":"transparent",color:tab===t.k?"#fff":"#94a3b8"}}>{t.i} {t.l}</button>)}
      </div>
    </div>
    <div style={{padding:"14px 16px",maxWidth:960,margin:"0 auto"}}>
      {tab==="dash"&&<Dash ch={ch} al={al} la={la} ti={ti} lo={lo}/>}
      {tab==="ch"&&<Charges data={ch} setData={setCh} save={sC} ro={ro}/>}
      {tab==="al"&&<Alim data={al} setData={setAl} save={sA} ro={ro}/>}
      {tab==="lo"&&<Loyers data={lo} setData={setLo} save={sO} ro={ro}/>}
      {tab==="la"&&<Ech title="Laamiri" data={la} setData={setLa} save={sL} color="#2563eb" ro={ro}/>}
      {tab==="ti"&&<Ech title="Tirmidi" data={ti} setData={setTi} save={sT} color="#dc2626" ro={ro}/>}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
